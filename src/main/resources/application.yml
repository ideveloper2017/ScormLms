springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    # Petstore demo'siga tushib qolmaslik uchun: query-config o'chiq,
    # default (petstore) URL bloklangan — har doim shu loyiha API'si ochiladi
    disable-swagger-default-url: true
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    filter: true
    persist-authorization: true
    display-request-duration: true
    display-operation-id: true
    default-models-expand-depth: 1
    deep-linking: true
    try-it-out-enabled: true

  default-produces-media-type: application/json
  default-consumes-media-type: application/json
  model-and-view-allowed: false


app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://172.16.10.159:8080,http://localhost:5173,http://localhost:4173,http://localhost:8080}
  seed:
        admin-password: admin
  jwt:
    # HS512 uchun kamida 64 baytlik secret talab qilinadi.
    # Prod muhitda JWT_SECRET env variable orqali beriladi; default faqat lokal dev uchun.
    secret: ${JWT_SECRET:dev-only-secret-do-not-use-in-production-0123456789abcdefghijklmnop}
    expiration: 86400000 # 24 hours in milliseconds
    refresh-expiration: 2592000000 # 30 days in milliseconds
    header: Authorization
    token-prefix: "Bearer "
    token-type: Bearer

  upload:
    dir: ./uploads


# File Storage Configuration
file:
  upload-dir: ./uploads
  max-file-size: 10MB
  allowed-extensions: jpg,jpeg,png,gif,pdf,doc,docx,xls,xlsx
